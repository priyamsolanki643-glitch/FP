steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/github.com/priyamsolanki643-glitch/fp:$COMMIT_SHA', './backend']

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/github.com/priyamsolanki643-glitch/fp:$COMMIT_SHA']

  # Step 3: Deploy directly to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        ENV_VARS="SYSTEM_REALISM_MODE=BRUTAL_EXPLICIT,SUPABASE_URL=$_SUPABASE_URL,SUPABASE_SERVICE_KEY=$_SUPABASE_SERVICE_KEY"
        if [ -n "$_AI_PROVIDER_KEY" ]; then
          ENV_VARS="AI_PROVIDER_KEY=$_AI_PROVIDER_KEY,$$ENV_VARS"
        fi
        gcloud run deploy fp --image=gcr.io/$PROJECT_ID/github.com/priyamsolanki643-glitch/fp:$COMMIT_SHA --region=europe-west1 --platform=managed --allow-unauthenticated --update-env-vars="$$ENV_VARS"

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/github.com/priyamsolanki643-glitch/fp:$COMMIT_SHA'

# Substitutions must be set in the Cloud Build Trigger settings
substitutions:
  _AI_PROVIDER_KEY: ''
