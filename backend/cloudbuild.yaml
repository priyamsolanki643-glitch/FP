steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/fp-backend:$COMMIT_SHA'
      - '.'

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/fp-backend:$COMMIT_SHA'

  # Step 3: Deploy directly to Cloud Run
        ENV_VARS="SYSTEM_REALISM_MODE=BRUTAL_EXPLICIT,PORT=8080,SUPABASE_URL=https://kscqvigvcfjdulonvdxa.supabase.co,SUPABASE_SERVICE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzY3F2aWd2Y2ZqZHVsb252ZHhhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDY2MjAxMywiZXhwIjoyMDk2MjM4MDEzfQ.lNlB6nnfaeP9UADMPrMLBh0NzXr_EK6GYZB8TszR_KM"
        if [ -n "$_AI_PROVIDER_KEY" ]; then
          ENV_VARS="AI_PROVIDER_KEY=$_AI_PROVIDER_KEY,$$ENV_VARS"
        fi
        gcloud run services update fp-backend --image=gcr.io/$PROJECT_ID/fp-backend:$COMMIT_SHA --region=us-central1 --platform=managed --allow-unauthenticated --port=8080 --update-env-vars="$$ENV_VARS"


images:
  - 'gcr.io/$PROJECT_ID/fp-backend:$COMMIT_SHA'

# Substitutions must be set in the Cloud Build Trigger settings
substitutions:
  _AI_PROVIDER_KEY: ''
  _SUPABASE_URL: ''
  _SUPABASE_SERVICE_KEY: ''
